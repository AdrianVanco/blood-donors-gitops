apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: wac-hospital  # chceme tieto objekty umiestniť do `wac-hospital` namespace
                         # tento zapis preťaží hodnoty "namespace" vo všetkých objektoch
labels:
- pairs:
    app.kubernetes.io/part-of: wac-hospital

resources:
- ../../../apps/cv2xvancoa-blood-donors-ufe
- ../../../apps/cv2xvancoa-blood-donors-webapi
- ../../../apps/mongo-express
- ../../../apps/http-echo

patches:
- path: patches/cv2xvancoa-blood-donors-webapi.service.yaml
- path: patches/mongodb-auth.secret.yaml

components:
- ../../../components/version-developers
- https://github.com/AdrianVanco/blood-donors-webapi//deployments/kustomize/components/mongodb
