spec:
  frontendClass: md-shell # default obsiahnutý v základe polyfea md-shell
  service:
    name: cv2xvancoa-blood-donors-ufe # referencia na službu odkiaľ sa má načítať modul
  modulePath: build/blood-donors-ufe.esm.js # cesta v rámci služby kde sa modul nachádza (názov podľa Stencil namespace)